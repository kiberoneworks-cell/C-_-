<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Крестики-Нолики | Игрок VS Бот</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', sans-serif;
        }
        
        /* Информационная панель */
        .ui-panel {
            position: absolute;
            z-index: 100;
            background: rgba(10, 20, 30, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 12px 24px;
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
        }
        
        #game-status {
            top: 20px;
            right: 20px;
            font-size: 1.2rem;
            font-family: monospace;
            border-right: 4px solid #ff9f43;
        }
        
        #game-title {
            top: 20px;
            left: 20px;
            font-size: 1rem;
            background: rgba(0,0,0,0.7);
            border-left: 4px solid #00d2d3;
        }
        
        #controls {
            bottom: 25px;
            left: 0;
            right: 0;
            text-align: center;
            position: absolute;
            z-index: 100;
            pointer-events: none;
        }
        
        button {
            pointer-events: auto;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 32px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 6px 0 #1e8449;
            letter-spacing: 1px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #1e8449;
            background: linear-gradient(135deg, #2ecc71, #2ecc71);
        }
        
        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1e8449;
        }
        
        .instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 6px 14px;
            border-radius: 20px;
            color: #ccc;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
        }
        
        @media (max-width: 700px) {
            .ui-panel { padding: 8px 16px; font-size: 0.8rem; }
            #game-status { font-size: 0.9rem; }
            button { padding: 8px 24px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div id="game-title" class="ui-panel">
        🧠 3D Tic-Tac-Toe | ✖ Игрок  vs  ○ Бот
    </div>
    <div id="game-status" class="ui-panel">
        🎮 Ваш ход
    </div>
    <div id="controls">
        <button id="reset-btn">⟳ Новая игра</button>
    </div>
    <div class="instruction">
        🖱️ Кликните по любой прозрачной ячейке, чтобы поставить ✖ | 🖱️ Мышь: вращайте/приближайте сцену
    </div>

    <!-- Импорт Three.js и дополнений -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ---------- ИНИЦИАЛИЗАЦИЯ СЦЕНЫ ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.012);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4.5, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Орбит контрол для вращения / масштабирования
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 1.0;
        controls.target.set(0, 0, 0);

        // ---------- ОСВЕЩЕНИЕ ----------
        // Ambient
        const ambient = new THREE.AmbientLight(0x404070);
        scene.add(ambient);
        // Главный направленный свет
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        // Заполняющий теплый свет снизу
        const fillLight = new THREE.PointLight(0xffaa66, 0.35);
        fillLight.position.set(0, -2, 0);
        scene.add(fillLight);
        // Холодный контровой свет
        const backLight = new THREE.PointLight(0x4488ff, 0.4);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        
        // Декоративная вспомогательная сетка
        const gridHelper = new THREE.GridHelper(9, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -1.9;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.25;
        scene.add(gridHelper);
        
        // Маленькие звездочки для атмосферы
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 800;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // ---------- ИГРОВАЯ ЛОГИКА ----------
        const SIZE = 3;         // 3x3x3
        const TOTAL = 27;
        let board = new Array(TOTAL).fill(null);   // 'player' или 'bot'
        let gameActive = true;
        let currentTurn = 'player';   // 'player' или 'bot'
        let aiTimeout = null;
        
        // Группа для хранения 3D моделей фигур (X и O)
        let markersGroup = new THREE.Group();
        scene.add(markersGroup);
        
        // Массив мешей ячеек для Raycaster
        let cellMeshes = [];
        
        // Координаты центров ячеек: диапазон [-1.2, 0, 1.2] с шагом 1.2
        const positions = [-1.2, 0, 1.2];
        const cellSize = 0.78;
        const boxMat = new THREE.MeshStandardMaterial({
            color: 0x3a6ea5,
            emissive: 0x0,
            transparent: true,
            opacity: 0.28,
            roughness: 0.4,
            metalness: 0.1
        });
        
        // ---------- ГЕНЕРАЦИЯ ВСЕХ ВЫИГРЫШНЫХ ЛИНИЙ (49 линий) ----------
        function getAllWinLines() {
            const lines = [];
            // Конвертер координат (x,y,z) -> индекс
            const idx = (x, y, z) => x * 9 + y * 3 + z;
            
            // 1. Линии по оси X (фикс Y, Z)
            for (let y = 0; y < SIZE; y++) {
                for (let z = 0; z < SIZE; z++) {
                    const line = [];
                    for (let x = 0; x < SIZE; x++) line.push(idx(x, y, z));
                    lines.push(line);
                }
            }
            // 2. Линии по оси Y (фикс X, Z)
            for (let x = 0; x < SIZE; x++) {
                for (let z = 0; z < SIZE; z++) {
                    const line = [];
                    for (let y = 0; y < SIZE; y++) line.push(idx(x, y, z));
                    lines.push(line);
                }
            }
            // 3. Линии по оси Z (фикс X, Y)
            for (let x = 0; x < SIZE; x++) {
                for (let y = 0; y < SIZE; y++) {
                    const line = [];
                    for (let z = 0; z < SIZE; z++) line.push(idx(x, y, z));
                    lines.push(line);
                }
            }
            // 4. Диагонали в плоскости XY (Z постоянная)
            for (let z = 0; z < SIZE; z++) {
                const diag1 = [], diag2 = [];
                for (let i = 0; i < SIZE; i++) {
                    diag1.push(idx(i, i, z));
                    diag2.push(idx(2 - i, i, z));
                }
                lines.push(diag1, diag2);
            }
            // 5. Диагонали в плоскости XZ (Y постоянная)
            for (let y = 0; y < SIZE; y++) {
                const diag1 = [], diag2 = [];
                for (let i = 0; i < SIZE; i++) {
                    diag1.push(idx(i, y, i));
                    diag2.push(idx(2 - i, y, i));
                }
                lines.push(diag1, diag2);
            }
            // 6. Диагонали в плоскости YZ (X постоянная)
            for (let x = 0; x < SIZE; x++) {
                const diag1 = [], diag2 = [];
                for (let i = 0; i < SIZE; i++) {
                    diag1.push(idx(x, i, i));
                    diag2.push(idx(x, i, 2 - i));
                }
                lines.push(diag1, diag2);
            }
            // 7. Пространственные диагонали куба (4 шт)
            // (0,0,0) -> (2,2,2)
            lines.push([idx(0,0,0), idx(1,1,1), idx(2,2,2)]);
            // (2,0,0) -> (0,2,2)
            lines.push([idx(2,0,0), idx(1,1,1), idx(0,2,2)]);
            // (0,2,0) -> (2,0,2)
            lines.push([idx(0,2,0), idx(1,1,1), idx(2,0,2)]);
            // (2,2,0) -> (0,0,2)
            lines.push([idx(2,2,0), idx(1,1,1), idx(0,0,2)]);
            
            return lines;
        }
        
        const winLines = getAllWinLines();
        
        // Функция проверки победителя на текущем board
        function checkWinner(boardState) {
            for (const line of winLines) {
                const [a, b, c] = line;
                if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
                    return boardState[a]; // 'player' или 'bot'
                }
            }
            return null;
        }
        
        // Проверка на ничью (все ячейки заполнены)
        function isDraw(boardState) {
            return boardState.every(cell => cell !== null);
        }
        
        // Обновление статуса в UI
        function updateUIStatus(message, isGameOver = false) {
            const statusDiv = document.getElementById('game-status');
            if (isGameOver) {
                statusDiv.style.borderRightColor = '#ff6b6b';
                statusDiv.style.backgroundColor = 'rgba(0,0,0,0.85)';
            } else {
                statusDiv.style.borderRightColor = '#ff9f43';
            }
            statusDiv.innerHTML = message;
        }
        
        // Завершение игры: показ сообщения, блокировка ходов
        function endGame(winner) {
            if (!gameActive) return;
            gameActive = false;
            if (winner === 'player') {
                updateUIStatus('🏆 ВЫ ПОБЕДИЛИ! 🏆', true);
            } else if (winner === 'bot') {
                updateUIStatus('🤖 БОТ ПОБЕДИЛ... 🤖', true);
            } else {
                updateUIStatus('🤝 НИЧЬЯ! 🤝', true);
            }
        }
        
        // Очистка всех маркеров сцены
        function clearMarkers() {
            while(markersGroup.children.length > 0) {
                markersGroup.remove(markersGroup.children[0]);
            }
        }
        
        // Создание 3D модели X (два пересекающихся цилиндра)
        function createX(positionVec, scaleVal = 0.42) {
            const group = new THREE.Group();
            const cylinderMat = new THREE.MeshStandardMaterial({ color: 0xff6b6b, metalness: 0.7, roughness: 0.2, emissive: 0x220000 });
            const cylGeo = new THREE.CylinderGeometry(0.12, 0.12, 1, 12);
            const bar1 = new THREE.Mesh(cylGeo, cylinderMat);
            bar1.rotation.z = Math.PI / 4;
            bar1.rotation.x = 0;
            bar1.scale.set(1, 0.9, 1);
            const bar2 = new THREE.Mesh(cylGeo, cylinderMat);
            bar2.rotation.z = -Math.PI / 4;
            bar2.rotation.x = 0;
            bar2.scale.set(1, 0.9, 1);
            group.add(bar1, bar2);
            group.position.copy(positionVec);
            group.scale.set(scaleVal, scaleVal, scaleVal);
            return group;
        }
        
        // Создание 3D модели O (тор + легкая сфера внутри)
        function createO(positionVec, scaleVal = 0.45) {
            const group = new THREE.Group();
            const torusMat = new THREE.MeshStandardMaterial({ color: 0x4ecdc4, metalness: 0.65, roughness: 0.25, emissive: 0x004040 });
            const torus = new THREE.Mesh(new THREE.TorusGeometry(0.45, 0.1, 24, 48), torusMat);
            torus.rotation.x = Math.PI / 2;
            const innerGlow = new THREE.Mesh(
                new THREE.SphereGeometry(0.28, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0x2c8c8c, emissive: 0x116666, transparent: true, opacity: 0.5 })
            );
            group.add(torus, innerGlow);
            group.position.copy(positionVec);
            group.scale.set(scaleVal, scaleVal, scaleVal);
            return group;
        }
        
        // Добавление фигуры в ячейку (обновление board и 3D)
        function placeMark(cellIndex, playerType) {
            if (!gameActive) return false;
            if (board[cellIndex] !== null) return false;
            if ((playerType === 'player' && currentTurn !== 'player') || (playerType === 'bot' && currentTurn !== 'bot')) return false;
            
            // Обновляем логику
            board[cellIndex] = playerType;
            const pos = cellMeshes[cellIndex].userData.positionVec;
            
            let model;
            if (playerType === 'player') {
                model = createX(pos, 0.45);
            } else {
                model = createO(pos, 0.48);
            }
            markersGroup.add(model);
            
            // Проверка победы / ничьи
            const winner = checkWinner(board);
            if (winner === 'player') {
                endGame('player');
                return true;
            } else if (winner === 'bot') {
                endGame('bot');
                return true;
            } else if (isDraw(board)) {
                endGame(null);
                return true;
            }
            
            // Смена хода
            if (playerType === 'player') {
                currentTurn = 'bot';
                updateUIStatus('🤖 Ход бота...');
                // Запуск AI с небольшой задержкой
                if (aiTimeout) clearTimeout(aiTimeout);
                aiTimeout = setTimeout(() => botMove(), 280);
            } else {
                currentTurn = 'player';
                updateUIStatus('🎮 Ваш ход | ✖');
            }
            return true;
        }
        
        // ---------- ИНТЕЛЛЕКТ БОТА (блокировка + выигрыш + случайный) ----------
        function getAvailableMoves() {
            const moves = [];
            for (let i = 0; i < TOTAL; i++) {
                if (board[i] === null) moves.push(i);
            }
            return moves;
        }
        
        // Поиск выигрышного хода для заданного игрока (playerType: 'player' или 'bot')
        function findWinningMove(playerType) {
            for (let i = 0; i < TOTAL; i++) {
                if (board[i] === null) {
                    const testBoard = [...board];
                    testBoard[i] = playerType;
                    if (checkWinner(testBoard) === playerType) {
                        return i;
                    }
                }
            }
            return null;
        }
        
        function botMove() {
            if (!gameActive || currentTurn !== 'bot') return;
            
            // 1. Может ли бот выиграть?
            let move = findWinningMove('bot');
            // 2. Блокировка игрока
            if (move === null) {
                move = findWinningMove('player');
            }
            // 3. Иначе случайный ход
            if (move === null) {
                const avail = getAvailableMoves();
                if (avail.length > 0) {
                    const rand = Math.floor(Math.random() * avail.length);
                    move = avail[rand];
                }
            }
            
            if (move !== null && gameActive && currentTurn === 'bot') {
                placeMark(move, 'bot');
            } else if (getAvailableMoves().length === 0 && gameActive) {
                // если нет ходов, но игра ещё активна - ничья
                if (isDraw(board)) endGame(null);
            }
        }
        
        // ---------- СОЗДАНИЕ 3D ЯЧЕЕК (кликабельные кубы) ----------
        function createBoardCells() {
            if (cellMeshes.length) {
                cellMeshes.forEach(mesh => scene.remove(mesh));
                cellMeshes = [];
            }
            const clickableGroup = new THREE.Group();
            const material = new THREE.MeshStandardMaterial({
                color: 0x5a8fbc,
                transparent: true,
                opacity: 0.32,
                roughness: 0.3,
                metalness: 0.2,
                emissive: 0x112233
            });
            
            const edgeMaterial = new THREE.MeshBasicMaterial({ color: 0xcceeff, transparent: true, opacity: 0.15 });
            
            for (let x = 0; x < SIZE; x++) {
                for (let y = 0; y < SIZE; y++) {
                    for (let z = 0; z < SIZE; z++) {
                        const px = positions[x];
                        const py = positions[y];
                        const pz = positions[z];
                        const posVec = new THREE.Vector3(px, py, pz);
                        
                        // Основной прозрачный куб
                        const boxGeo = new THREE.BoxGeometry(cellSize, cellSize, cellSize);
                        const cube = new THREE.Mesh(boxGeo, material);
                        cube.position.copy(posVec);
                        cube.castShadow = true;
                        cube.receiveShadow = false;
                        cube.userData = { cellIndex: x * 9 + y * 3 + z, positionVec: posVec };
                        clickableGroup.add(cube);
                        
                        // Добавляем тонкие рёбра для красоты
                        const edgesGeo = new THREE.EdgesGeometry(boxGeo);
                        const wire = new THREE.LineSegments(edgesGeo, edgeMaterial);
                        wire.position.copy(posVec);
                        clickableGroup.add(wire);
                        
                        cellMeshes.push(cube);
                    }
                }
            }
            scene.add(clickableGroup);
        }
        
        // ---------- СБРОС ИГРЫ ----------
        function resetGame() {
            // Отменяем ход бота, если был запланирован
            if (aiTimeout) clearTimeout(aiTimeout);
            board.fill(null);
            gameActive = true;
            currentTurn = 'player';
            clearMarkers();
            updateUIStatus('🎮 Ваш ход | ✖', false);
            // Не пересоздаём ячейки, просто удаляем фигуры
            // Если нужно сбросить состояние камеры? Необязательно
        }
        
        // Полный рестарт с пересозданием поля (для чистоты)
        function fullRestart() {
            resetGame();
            // но нужно убедиться что клики работают (всё ок)
        }
        
        // ---------- RAYCASTER ДЛЯ КЛИКОВ ----------
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        function onClickCanvas(event) {
            if (!gameActive || currentTurn !== 'player') return;
            
            // вычисляем координаты мыши в диапазоне -1 .. +1
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cellMeshes);
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                const cellIndex = hit.userData.cellIndex;
                if (board[cellIndex] === null) {
                    placeMark(cellIndex, 'player');
                }
            }
        }
        
        // ---------- АНИМАЦИЯ И ЗАПУСК ----------
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // обновляем орбит
            renderer.render(scene, camera);
        }
        
        function init() {
            createBoardCells();
            resetGame(); // чистим доску и маркеры
            // назначаем обработчик клика на canvas
            renderer.domElement.addEventListener('click', onClickCanvas);
            document.getElementById('reset-btn').addEventListener('click', () => {
                if (aiTimeout) clearTimeout(aiTimeout);
                resetGame();
                // дополнительно если бот должен ходить первым? нет, игрок первый
                currentTurn = 'player';
                gameActive = true;
                updateUIStatus('🎮 Ваш ход | ✖');
            });
            animate();
        }
        
        init();
        
        // Небольшой эффект вращения звезд (просто эстетика)
        function starTwinkle() {
            stars.rotation.y += 0.0005;
            stars.rotation.x += 0.0003;
            requestAnimationFrame(starTwinkle);
        }
        starTwinkle();
    </script>
</body>
</html>
