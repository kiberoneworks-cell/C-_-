<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Крестики-Нолики | Мобильная версия</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            touch-action: none; /* улучшает производительность касаний */
        }
        
        /* Информационные панели — адаптивные */
        .ui-panel {
            position: absolute;
            z-index: 100;
            background: rgba(10, 20, 35, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 8px 18px;
            color: white;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
            font-size: clamp(12px, 4vw, 18px);
            white-space: nowrap;
        }
        
        #game-status {
            top: 15px;
            right: 15px;
            border-right: 4px solid #ff9f43;
            background: rgba(0,0,0,0.8);
        }
        
        #game-title {
            top: 15px;
            left: 15px;
            border-left: 4px solid #00d2d3;
            font-size: clamp(11px, 3.5vw, 16px);
            white-space: normal;
            text-align: left;
            max-width: 45%;
        }
        
        #controls {
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            position: absolute;
            z-index: 100;
            pointer-events: none;
        }
        
        button {
            pointer-events: auto;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: white;
            font-size: clamp(14px, 5vw, 20px);
            font-weight: bold;
            padding: 10px 28px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 5px 0 #1e8449;
            letter-spacing: 1px;
            touch-action: manipulation;
        }
        
        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #1e8449;
        }
        
        .instruction {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.55);
            padding: 5px 12px;
            border-radius: 24px;
            color: #ccc;
            font-size: 10px;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        
        @media (max-width: 700px) {
            .instruction {
                font-size: 8px;
                bottom: 10px;
            }
            .ui-panel {
                padding: 6px 12px;
            }
        }
        
        /* Предотвращаем прокрутку страницы при касании canvas */
        canvas {
            touch-action: none;
        }
    </style>
</head>
<body>
    <div id="game-title" class="ui-panel">
        🧠 3D Tic-Tac-Toe | ✖ Игрок  vs  ○ Бот
    </div>
    <div id="game-status" class="ui-panel">
        🎮 Ваш ход
    </div>
    <div id="controls">
        <button id="reset-btn">⟳ Новая игра</button>
    </div>
    <div class="instruction">
        👆🏻 Коснитесь ячейки — поставить ✖ | 🖐🏻 Один палец: вращение, два — масштаб/поворот
    </div>

    <!-- Импорт Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ---------- ИНИЦИАЛИЗАЦИЯ СЦЕНЫ ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);

        // Камера — отодвинута чуть дальше для лучшего обзора (из-за увеличенного расстояния)
        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6.5, 5.8, 7.2);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Орбит контрол — полностью поддерживает touch (масштабирование двумя пальцами, вращение)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;          // плавность
        controls.dampingFactor = 0.06;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.0;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 0, 0);
        // Для мобильных устройств улучшаем реакцию
        controls.touchRotate = true;
        controls.touchZoom = true;
        
        // ---------- ОСВЕЩЕНИЕ ----------
        const ambient = new THREE.AmbientLight(0x404070);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(3, 6, 2);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.4);
        fillLight.position.set(0, -2.5, 0);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x4488ff, 0.45);
        backLight.position.set(-3, 1.5, -4);
        scene.add(backLight);
        const rimLight = new THREE.PointLight(0xff8866, 0.3);
        rimLight.position.set(2, 1, -3);
        scene.add(rimLight);
        
        // Декоративная сетка
        const gridHelper = new THREE.GridHelper(11, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -2.4;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.2;
        scene.add(gridHelper);
        
        // Звёздный фон
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1200;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 220;
            starPositions[i*3+1] = (Math.random() - 0.5) * 120;
            starPositions[i*3+2] = (Math.random() - 0.5) * 90 - 45;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.07, transparent: true, opacity: 0.7 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // ---------- ИГРОВАЯ ЛОГИКА ----------
        const SIZE = 3;
        const TOTAL = 27;
        let board = new Array(TOTAL).fill(null);
        let gameActive = true;
        let currentTurn = 'player';   // 'player' или 'bot'
        let aiTimeout = null;
        
        let markersGroup = new THREE.Group();
        scene.add(markersGroup);
        let cellMeshes = [];
        
        // УВЕЛИЧЕННОЕ РАССТОЯНИЕ МЕЖДУ ЯЧЕЙКАМИ: шаг 1.9 вместо 1.2
        const step = 1.9;
        const positions = [-step, 0, step];
        const cellSize = 0.95;  // чуть увеличен для удобного нажатия на телефоне
        const boxMaterial = new THREE.MeshStandardMaterial({
            color: 0x4a7db4,
            emissive: 0x0,
            transparent: true,
            opacity: 0.3,
            roughness: 0.35,
            metalness: 0.15
        });
        
        // ---------- ВСЕ ВЫИГРЫШНЫЕ ЛИНИИ (49) ----------
        function getAllWinLines() {
            const lines = [];
            const idx = (x, y, z) => x * 9 + y * 3 + z;
            
            // Оси X
            for (let y = 0; y < SIZE; y++) {
                for (let z = 0; z < SIZE; z++) {
                    const line = [];
                    for (let x = 0; x < SIZE; x++) line.push(idx(x, y, z));
                    lines.push(line);
                }
            }
            // Оси Y
            for (let x = 0; x < SIZE; x++) {
                for (let z = 0; z < SIZE; z++) {
                    const line = [];
                    for (let y = 0; y < SIZE; y++) line.push(idx(x, y, z));
                    lines.push(line);
                }
            }
            // Оси Z
            for (let x = 0; x < SIZE; x++) {
                for (let y = 0; y < SIZE; y++) {
                    const line = [];
                    for (let z = 0; z < SIZE; z++) line.push(idx(x, y, z));
                    lines.push(line);
                }
            }
            // Диагонали в плоскостях XY
            for (let z = 0; z < SIZE; z++) {
                const diag1 = [], diag2 = [];
                for (let i = 0; i < SIZE; i++) {
                    diag1.push(idx(i, i, z));
                    diag2.push(idx(2 - i, i, z));
                }
                lines.push(diag1, diag2);
            }
            // Диагонали в XZ
            for (let y = 0; y < SIZE; y++) {
                const diag1 = [], diag2 = [];
                for (let i = 0; i < SIZE; i++) {
                    diag1.push(idx(i, y, i));
                    diag2.push(idx(2 - i, y, i));
                }
                lines.push(diag1, diag2);
            }
            // Диагонали в YZ
            for (let x = 0; x < SIZE; x++) {
                const diag1 = [], diag2 = [];
                for (let i = 0; i < SIZE; i++) {
                    diag1.push(idx(x, i, i));
                    diag2.push(idx(x, i, 2 - i));
                }
                lines.push(diag1, diag2);
            }
            // Пространственные диагонали
            lines.push([idx(0,0,0), idx(1,1,1), idx(2,2,2)]);
            lines.push([idx(2,0,0), idx(1,1,1), idx(0,2,2)]);
            lines.push([idx(0,2,0), idx(1,1,1), idx(2,0,2)]);
            lines.push([idx(2,2,0), idx(1,1,1), idx(0,0,2)]);
            return lines;
        }
        
        const winLines = getAllWinLines();
        
        function checkWinner(boardState) {
            for (const line of winLines) {
                const [a, b, c] = line;
                if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
                    return boardState[a];
                }
            }
            return null;
        }
        
        function isDraw(boardState) {
            return boardState.every(cell => cell !== null);
        }
        
        function updateUIStatus(message, isGameOver = false) {
            const statusDiv = document.getElementById('game-status');
            if (isGameOver) {
                statusDiv.style.borderRightColor = '#ff6b6b';
            } else {
                statusDiv.style.borderRightColor = '#ff9f43';
            }
            statusDiv.innerHTML = message;
        }
        
        function endGame(winner) {
            if (!gameActive) return;
            gameActive = false;
            if (winner === 'player') {
                updateUIStatus('🏆 ВЫ ПОБЕДИЛИ! 🏆', true);
            } else if (winner === 'bot') {
                updateUIStatus('🤖 БОТ ПОБЕДИЛ... 🤖', true);
            } else {
                updateUIStatus('🤝 НИЧЬЯ! 🤝', true);
            }
        }
        
        function clearMarkers() {
            while(markersGroup.children.length) {
                markersGroup.remove(markersGroup.children[0]);
            }
        }
        
        // Создание модели X
        function createX(positionVec, scaleVal = 0.52) {
            const group = new THREE.Group();
            const cylinderMat = new THREE.MeshStandardMaterial({ color: 0xff6b6b, metalness: 0.7, roughness: 0.2, emissive: 0x331100 });
            const cylGeo = new THREE.CylinderGeometry(0.13, 0.13, 1, 12);
            const bar1 = new THREE.Mesh(cylGeo, cylinderMat);
            bar1.rotation.z = Math.PI / 4;
            bar1.scale.set(1, 0.9, 1);
            const bar2 = new THREE.Mesh(cylGeo, cylinderMat);
            bar2.rotation.z = -Math.PI / 4;
            bar2.scale.set(1, 0.9, 1);
            group.add(bar1, bar2);
            group.position.copy(positionVec);
            group.scale.set(scaleVal, scaleVal, scaleVal);
            return group;
        }
        
        // Создание модели O
        function createO(positionVec, scaleVal = 0.55) {
            const group = new THREE.Group();
            const torusMat = new THREE.MeshStandardMaterial({ color: 0x4ecdc4, metalness: 0.65, roughness: 0.25, emissive: 0x006060 });
            const torus = new THREE.Mesh(new THREE.TorusGeometry(0.48, 0.1, 24, 48), torusMat);
            torus.rotation.x = Math.PI / 2;
            const innerGlow = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0x2c8c8c, emissive: 0x117777, transparent: true, opacity: 0.45 })
            );
            group.add(torus, innerGlow);
            group.position.copy(positionVec);
            group.scale.set(scaleVal, scaleVal, scaleVal);
            return group;
        }
        
        function placeMark(cellIndex, playerType) {
            if (!gameActive) return false;
            if (board[cellIndex] !== null) return false;
            if ((playerType === 'player' && currentTurn !== 'player') || (playerType === 'bot' && currentTurn !== 'bot')) return false;
            
            board[cellIndex] = playerType;
            const pos = cellMeshes[cellIndex].userData.positionVec;
            const model = (playerType === 'player') ? createX(pos, 0.52) : createO(pos, 0.55);
            markersGroup.add(model);
            
            const winner = checkWinner(board);
            if (winner === 'player') {
                endGame('player');
                return true;
            } else if (winner === 'bot') {
                endGame('bot');
                return true;
            } else if (isDraw(board)) {
                endGame(null);
                return true;
            }
            
            if (playerType === 'player') {
                currentTurn = 'bot';
                updateUIStatus('🤖 Ход бота...');
                if (aiTimeout) clearTimeout(aiTimeout);
                aiTimeout = setTimeout(() => botMove(), 280);
            } else {
                currentTurn = 'player';
                updateUIStatus('🎮 Ваш ход ✖');
            }
            return true;
        }
        
        function getAvailableMoves() {
            const moves = [];
            for (let i = 0; i < TOTAL; i++) if (board[i] === null) moves.push(i);
            return moves;
        }
        
        function findWinningMove(playerType) {
            for (let i = 0; i < TOTAL; i++) {
                if (board[i] === null) {
                    const testBoard = [...board];
                    testBoard[i] = playerType;
                    if (checkWinner(testBoard) === playerType) return i;
                }
            }
            return null;
        }
        
        function botMove() {
            if (!gameActive || currentTurn !== 'bot') return;
            let move = findWinningMove('bot');
            if (move === null) move = findWinningMove('player');
            if (move === null) {
                const avail = getAvailableMoves();
                if (avail.length) move = avail[Math.floor(Math.random() * avail.length)];
            }
            if (move !== null && gameActive && currentTurn === 'bot') {
                placeMark(move, 'bot');
            } else if (getAvailableMoves().length === 0 && gameActive) {
                if (isDraw(board)) endGame(null);
            }
        }
        
        // ---------- СОЗДАНИЕ ЯЧЕЕК С УВЕЛИЧЕННЫМ ШАГОМ ----------
        function createBoardCells() {
            if (cellMeshes.length) {
                cellMeshes.forEach(mesh => scene.remove(mesh));
                cellMeshes = [];
            }
            const group = new THREE.Group();
            const material = new THREE.MeshStandardMaterial({
                color: 0x5a8fbc,
                transparent: true,
                opacity: 0.35,
                roughness: 0.3,
                metalness: 0.2,
                emissive: 0x112244
            });
            const edgeMaterial = new THREE.MeshBasicMaterial({ color: 0xaaddff, transparent: true, opacity: 0.2 });
            
            for (let x = 0; x < SIZE; x++) {
                for (let y = 0; y < SIZE; y++) {
                    for (let z = 0; z < SIZE; z++) {
                        const px = positions[x];
                        const py = positions[y];
                        const pz = positions[z];
                        const posVec = new THREE.Vector3(px, py, pz);
                        
                        const boxGeo = new THREE.BoxGeometry(cellSize, cellSize, cellSize);
                        const cube = new THREE.Mesh(boxGeo, material);
                        cube.position.copy(posVec);
                        cube.castShadow = true;
                        cube.userData = { cellIndex: x * 9 + y * 3 + z, positionVec: posVec };
                        group.add(cube);
                        
                        const edgesGeo = new THREE.EdgesGeometry(boxGeo);
                        const wire = new THREE.LineSegments(edgesGeo, edgeMaterial);
                        wire.position.copy(posVec);
                        group.add(wire);
                        
                        cellMeshes.push(cube);
                    }
                }
            }
            scene.add(group);
        }
        
        function resetGame() {
            if (aiTimeout) clearTimeout(aiTimeout);
            board.fill(null);
            gameActive = true;
            currentTurn = 'player';
            clearMarkers();
            updateUIStatus('🎮 Ваш ход ✖', false);
        }
        
        // ---------- ОБРАБОТЧИК КАСАНИЙ / КЛИКОВ ДЛЯ ТЕЛЕФОНА ----------
        const raycaster = new THREE.Raycaster();
        const touchPoint = new THREE.Vector2();
        
        function onPointerEvent(event) {
            if (!gameActive || currentTurn !== 'player') return;
            
            // Определяем координаты (клик или touch)
            let clientX, clientY;
            if (event.touches) {
                // touch-событие
                if (event.touches.length === 0) return;
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
                event.preventDefault();   // предотвращаем прокрутку
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            
            const rect = renderer.domElement.getBoundingClientRect();
            touchPoint.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            touchPoint.y = -((clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(touchPoint, camera);
            const intersects = raycaster.intersectObjects(cellMeshes);
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                const cellIndex = hit.userData.cellIndex;
                if (board[cellIndex] === null) {
                    placeMark(cellIndex, 'player');
                }
            }
        }
        
        // ---------- АНИМАЦИЯ ----------
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        // Звёздное вращение
        function starSpin() {
            stars.rotation.y += 0.0004;
            stars.rotation.x += 0.0002;
            requestAnimationFrame(starSpin);
        }
        
        // ---------- ИНИЦИАЛИЗАЦИЯ ----------
        function init() {
            createBoardCells();
            resetGame();
            
            // Поддержка и мыши, и тач-событий
            renderer.domElement.addEventListener('click', onPointerEvent);
            renderer.domElement.addEventListener('touchstart', onPointerEvent, { passive: false });
            
            document.getElementById('reset-btn').addEventListener('click', () => {
                if (aiTimeout) clearTimeout(aiTimeout);
                resetGame();
                currentTurn = 'player';
                gameActive = true;
                updateUIStatus('🎮 Ваш ход ✖');
            });
            animate();
            starSpin();
        }
        
        init();
    </script>
</body>
</html>
